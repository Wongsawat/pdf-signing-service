server:
  port: 8087

spring:
  application:
    name: pdf-signing-service

  # Database configuration
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pdfsigning_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  # JPA configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # Flyway configuration
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # Cloud configuration
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 30000
            loggerLevel: basic
          csc-auth-client:
            url: ${CSC_SERVICE_URL:http://localhost:9000}
          csc-api-client:
            url: ${CSC_SERVICE_URL:http://localhost:9000}

# Apache Camel configuration
camel:
  springboot:
    name: pdf-signing-camel
    main-run-controller: true
  dataformat:
    jackson:
      auto-discover-object-mapper: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

# Eureka configuration
eureka:
  client:
    enabled: ${EUREKA_ENABLED:false}
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 30

# Application-specific configuration
app:
  kafka:
    bootstrap-servers: ${KAFKA_BROKERS:localhost:9092}
    topics:
      # Saga topics
      saga-command: saga.command.pdf-signing
      saga-compensation: saga.compensation.pdf-signing
      saga-reply: saga.reply.pdf-signing
      notification-events: notification.events
      dlq: pdf.signing.dlq

  csc:
    service-url: ${CSC_SERVICE_URL:http://localhost:9000}
    auth-endpoint: /csc/v2/oauth2/authorize
    sign-hash-endpoint: /csc/v2/signatures/signHash
    credential-id: ${CSC_CREDENTIAL_ID:default-credential}
    client-id: ${CSC_CLIENT_ID:pdf-signing-service}
    hash-algo: SHA256
    timeout-seconds: 30
    sad:
      # Minimum SAD token expiry in seconds (reject if expires sooner)
      min-expiry-seconds: ${CSC_SAD_MIN_EXPIRY_SECONDS:60}
      # Maximum SAD token expiry in seconds (warn if exceeds this)
      max-expiry-seconds: ${CSC_SAD_MAX_EXPIRY_SECONDS:3600}
    cert:
      # Enable certificate chain validation
      validation:
        enabled: ${CSC_CERT_VALIDATION_ENABLED:true}
      # Maximum certificate validity period in days (warn if exceeds)
      max-validity-days: ${CSC_CERT_MAX_VALIDITY_DAYS:365}
      # Minimum remaining validity in days (warn if less than this)
      min-validity-remaining-days: ${CSC_CERT_MIN_VALIDITY_REMAINING_DAYS:7}

  # PAdES configuration
  pades:
    # Conformance level: BASELINE_B, BASELINE_T, BASELINE_LT, BASELINE_LTA
    level: ${PADES_LEVEL:BASELINE_B}

  storage:
    provider: ${STORAGE_PROVIDER:local}
    local:
      base-path: ${SIGNED_PDF_STORAGE_PATH:/var/signed-documents}
      base-url: ${SIGNED_PDF_STORAGE_BASE_URL:http://localhost:8087}
    s3:
      bucket-name: ${S3_BUCKET_NAME:etax-signed-pdfs}
      region: ${AWS_REGION:us-east-1}
      access-key: ${AWS_ACCESS_KEY:minioadmin}
      secret-key: ${AWS_SECRET_KEY:minioadmin}
      endpoint: ${S3_ENDPOINT:http://localhost:9100}
      path-style-access: ${S3_PATH_STYLE_ACCESS:true}
      # TTL in minutes for presigned GET URLs returned after document upload.
      # Must cover the full saga duration so downstream services can download the PDF.
      presigned-url-ttl-minutes: ${S3_PRESIGNED_URL_TTL_MINUTES:60}

  # PDF size validation
  pdf:
    max-size-bytes: ${PDF_MAX_SIZE_BYTES:5242880}  # 5 MB default

# Saga-commons configuration (outbox pattern)
saga:
  outbox:
    cleanup:
      enabled: ${OUTBOX_CLEANUP_ENABLED:true}
      cron-expression: "0 0 2 * * ?"
      retention-hours: 24
    publisher:
      batch-size: 100
      poll-interval-millis: 1000
      max-retries: 3

# Resilience4j configuration
resilience4j:
  circuitbreaker:
    instances:
      csc-auth:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10
      csc-sign-hash:
        registerHealthIndicator: true
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        waitDurationInOpenState: 10s
        failureRateThreshold: 50
        eventConsumerBufferSize: 10

  timelimiter:
    instances:
      csc-auth:
        timeoutDuration: 5s
      csc-sign-hash:
        timeoutDuration: 30s

# Actuator configuration
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,camelroutes
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

# Logging configuration
logging:
  level:
    root: INFO
    com.wpanther.pdfsigning: DEBUG
    org.apache.camel: INFO
    org.apache.camel.component.kafka: DEBUG
    org.springframework.cloud.openfeign: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
